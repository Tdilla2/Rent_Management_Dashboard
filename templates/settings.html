{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-building"></i> Company Info</h5>
            </div>
            <div class="card-body">
                <form method="post">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control" value="{{ settings.company_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Address</label>
                        <input type="text" name="company_address" class="form-control" value="{{ settings.company_address }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Phone</label>
                        <input type="text" name="company_phone" class="form-control" value="{{ settings.company_phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Year</label>
                        <input type="number" name="current_year" class="form-control" value="{{ settings.current_year }}" style="width:120px">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Settings</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
