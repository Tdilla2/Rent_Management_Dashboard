{% extends "base.html" %}
{% block title %}Fee Schedule{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0"><i class="bi bi-currency-dollar"></i> Fee Schedule</h5>
            </div>
            <div class="card-body">
                <form method="post" id="feeForm">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Item List</th>
                                <th>Amount ($)</th>
                                <th>Description</th>
                                <th class="no-print"></th>
                            </tr>
                        </thead>
                        <tbody id="feeTable">
                            {% for fee in fees %}
                            <tr>
                                <td><input type="text" name="fee_type_{{ loop.index0 }}" class="form-control form-control-sm" value="{{ fee.fee_type }}"></td>
                                <td><input type="number" name="fee_amount_{{ loop.index0 }}" class="form-control form-control-sm" step="0.01" value="{{ fee.amount }}" style="width:100px"></td>
                                <td><input type="text" name="fee_desc_{{ loop.index0 }}" class="form-control form-control-sm" value="{{ fee.description }}"></td>
                                <td class="no-print"><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-success no-print" onclick="addFeeRow()"><i class="bi bi-plus-lg"></i> Add Fee</button>
                        <button type="submit" class="btn btn-primary no-print"><i class="bi bi-save"></i> Save</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary no-print"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let feeIdx = {{ fees|length }};
function addFeeRow() {
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input type="text" name="fee_type_${feeIdx}" class="form-control form-control-sm"></td>
        <td><input type="number" name="fee_amount_${feeIdx}" class="form-control form-control-sm" step="0.01" value="0" style="width:100px"></td>
        <td><input type="text" name="fee_desc_${feeIdx}" class="form-control form-control-sm"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
    `;
    document.getElementById('feeTable').appendChild(row);
    feeIdx++;
}
// Reindex before submit
document.getElementById('feeForm').addEventListener('submit', function() {
    const rows = document.querySelectorAll('#feeTable tr');
    rows.forEach((row, i) => {
        row.querySelectorAll('input').forEach(inp => {
            const parts = inp.name.split('_');
            parts[parts.length - 1] = i;
            inp.name = parts.join('_');
        });
    });
});
</script>
{% endblock %}
